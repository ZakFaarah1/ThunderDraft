services:
  backend:
    build:
      context: ./backend
    restart: unless-stopped

    environment:
      # Tells FastAPI where to store persistent NFL cache files.
      THUNDERDRAFT_CACHE_DIR: /app/data/cache

    volumes:
      # Maps the Ubuntu data folder into the backend container.
      - ./backend/data:/app/data

    logging:
      # Prevents Docker logs from growing indefinitely.
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

    ports:
      - "8001:8000"

  frontend:
    build:
      context: ./frontend
    restart: unless-stopped

    logging:
      # Keeps a limited number of frontend log files.
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

    ports:
      - "5050:80"

    depends_on:
      - backend
