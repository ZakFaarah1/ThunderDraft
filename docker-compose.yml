services:
  backend:
    build:
      context: ./backend

    restart: unless-stopped

    environment:
      # Stores downloaded NFL data in the persistent Ubuntu folder.
      THUNDERDRAFT_CACHE_DIR: /app/data/cache

      # Selects the upcoming fantasy-football season.
      THUNDERDRAFT_DRAFT_SEASON: ${THUNDERDRAFT_DRAFT_SEASON:-2026}

    volumes:
      # Keeps caches and future database files across container rebuilds.
      - ./backend/data:/app/data

    healthcheck:
      # Uses Python because the slim backend image does not include curl.
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health', timeout=5)",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  frontend:
    build:
      context: ./frontend

    restart: unless-stopped

    depends_on:
      backend:
        condition: service_healthy

    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -qO- http://127.0.0.1/ >/dev/null || exit 1",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

    ports:
      - "5050:80"
